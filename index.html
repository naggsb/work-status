        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; margin: 0; color: #333; padding-bottom: 80px; }
        
        /* 統一ヘッダーのスタイル（Tailwindを使用せずに既存のCSSに組み込み） */
        .header-container { background-color: #1d4ed8; color: white; padding: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .header-container h1 { text-align: center; font-size: 1.25rem; font-weight: bold; margin: 0 0 12px 0; letter-spacing: 0.05em; text-shadow: none; }

        .search-box { display: flex; gap: 8px; }

        .search-box input:focus { box-shadow: 0 0 0 2px #60a5fa; }
        
        /* 更新ボタンのスタイル */
        .refresh-btn {

        }
        .refresh-btn:hover { background-color: #16a34a; }
        .refresh-btn:active { transform: scale(0.95); }
